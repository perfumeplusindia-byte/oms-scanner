<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>OMS Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:system-ui,-apple-system,sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
#videoWrap{position:relative;flex:1;overflow:hidden;background:#000}
#video{width:100%;height:100%;object-fit:cover;display:block}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:16px;background:linear-gradient(180deg,rgba(0,0,0,.6) 0%,transparent 25%,transparent 65%,rgba(0,0,0,.75) 100%)}
#topBar{display:flex;justify-content:space-between;align-items:center;gap:8px}
#ctxBadge{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);padding:7px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.15)}
#torchBtn,#closeBtn{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
#torchBtn:active,#closeBtn:active{background:rgba(255,255,255,.3)}
#finder{align-self:center;width:75vw;max-width:300px;height:120px;border:2px solid rgba(255,255,255,.4);border-radius:10px;position:relative;overflow:hidden}
.cn{position:absolute;width:18px;height:18px}
.cn.tl{top:-2px;left:-2px;border-top:3px solid #4edea3;border-left:3px solid #4edea3;border-radius:4px 0 0 0}
.cn.tr{top:-2px;right:-2px;border-top:3px solid #4edea3;border-right:3px solid #4edea3;border-radius:0 4px 0 0}
.cn.bl{bottom:-2px;left:-2px;border-bottom:3px solid #4edea3;border-left:3px solid #4edea3;border-radius:0 0 0 4px}
.cn.br{bottom:-2px;right:-2px;border-bottom:3px solid #4edea3;border-right:3px solid #4edea3;border-radius:0 0 4px 0}
#scanLine{position:absolute;left:5%;width:90%;height:2px;background:#4edea3;box-shadow:0 0 8px #4edea3,0 0 2px #fff;border-radius:2px;animation:sc 1.8s ease-in-out infinite}
@keyframes sc{0%,100%{top:10%}50%{top:82%}}
#statusTxt{text-align:center;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;opacity:.75;min-height:18px}
/* Bottom panel */
#bottomPanel{display:flex;flex-direction:column;gap:10px}
#listWrap{background:rgba(255,255,255,.07);backdrop-filter:blur(10px);border-radius:14px;padding:10px 12px;max-height:160px;overflow-y:auto}
#listHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
#listHead span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.55}
#cnt{background:#4edea3;color:#000;border-radius:999px;padding:1px 8px;font-size:11px;font-weight:900}
#items{display:flex;flex-direction:column;gap:5px}
.item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.09);border-radius:8px;padding:7px 10px;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1}}
.iico{width:26px;height:26px;border-radius:6px;background:#4edea3;color:#000;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.iawb{font-family:monospace;font-size:13px;font-weight:700;flex:1;letter-spacing:.02em}
.idel{width:26px;height:26px;background:rgba(220,38,38,.25);border-radius:6px;border:none;color:#ff6b6b;font-size:17px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
#btnRow{display:flex;gap:8px}
#manualBtn{flex:1;height:46px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:12px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
#sendBtn{flex:2;height:46px;border:2px solid #4edea3;border-radius:12px;background:rgba(78,222,163,.08);color:#4edea3;font-weight:900;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.04em;transition:.15s;text-transform:uppercase}
#sendBtn:not(:disabled):hover{background:#4edea3;color:#000}
#sendBtn:disabled{opacity:.3;cursor:not-allowed}
/* Error toast */
#errBox{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#dc2626;color:#fff;padding:9px 18px;border-radius:12px;font-size:12px;font-weight:700;z-index:99;display:none;text-align:center;max-width:300px;border:1px solid rgba(255,100,100,.3)}
/* Manual modal */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:flex-end;justify-content:center;z-index:200}
#modal.on{display:flex}
#modalBox{background:#141414;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;border-top:1px solid rgba(255,255,255,.1)}
#modalBox h3{font-size:15px;font-weight:700;margin-bottom:14px}
#mInput{width:100%;background:#222;border:1px solid #333;border-radius:8px;padding:12px 14px;color:#fff;font-size:16px;font-family:monospace;text-transform:uppercase;letter-spacing:.05em;outline:none}
#mInput:focus{border-color:#4edea3}
#mOk{width:100%;height:46px;background:#4edea3;border:none;border-radius:10px;color:#000;font-weight:900;font-size:15px;cursor:pointer;margin-top:10px}
#mCx{width:100%;height:40px;background:transparent;border:none;color:rgba(255,255,255,.4);font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div id="videoWrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay">
    <div id="topBar">
      <span id="ctxBadge">📦 OMS Scanner</span>
      <button id="torchBtn" onclick="toggleTorch()" title="Torch">⚡</button>
      <button id="closeBtn" onclick="doClose()">✕</button>
    </div>
    <div id="finder">
      <div class="cn tl"></div><div class="cn tr"></div>
      <div class="cn bl"></div><div class="cn br"></div>
      <div id="scanLine"></div>
    </div>
    <div id="statusTxt">Starting camera…</div>
  </div>
</div>

<div id="bottomPanel" style="padding:10px 14px 16px;background:#0a0a0a">
  <div id="listWrap">
    <div id="listHead">
      <span>Scanned AWBs</span>
      <span id="cnt">0</span>
    </div>
    <div id="items"><p style="opacity:.35;font-size:12px;text-align:center;padding:6px 0">No scans yet</p></div>
  </div>
  <div id="btnRow">
    <button id="manualBtn" onclick="openModal()">✏️ Manual</button>
    <button id="sendBtn" disabled onclick="sendAll()">Send All ▶</button>
  </div>
</div>

<div id="errBox"></div>

<div id="modal">
  <div id="modalBox">
    <h3>Manual AWB Entry</h3>
    <input id="mInput" type="text" placeholder="TYPE AWB" autocapitalize="characters" autocomplete="off" autocorrect="off">
    <button id="mOk" onclick="doManual()">Add AWB</button>
    <button id="mCx" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
// ── PARAMS ──
var params  = new URLSearchParams(location.search);
var RET_URL = params.get('ret') || '';
var CTX     = params.get('ctx') || 'dispatch';
var labels  = {dispatch:'📦 Outbound Scan', return:'↩️ Returns Scan', track:'🔍 Track Scan'};
document.getElementById('ctxBadge').textContent = labels[CTX] || '📦 OMS Scanner';

// ── STATE ──
var scanned = [];
var lastCode = '', lastTime = 0;
var track = null; // ZXing controls object

// ── RENDER LIST ──
function render() {
  var n = scanned.length;
  document.getElementById('cnt').textContent = n;
  document.getElementById('sendBtn').disabled = n === 0;
  var el = document.getElementById('items');
  if (!n) { el.innerHTML='<p style="opacity:.35;font-size:12px;text-align:center;padding:6px 0">No scans yet</p>'; return; }
  el.innerHTML = scanned.map(function(a,i){
    return '<div class="item"><div class="iico">▦</div><span class="iawb">'+a+'</span>'
      +'<button class="idel" onclick="del('+i+')">×</button></div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function del(i){ scanned.splice(i,1); render(); }

// ── ADD AWB ──
function addAWB(code) {
  code = code.trim().toUpperCase().replace(/\s+/g,'');
  if (!code || code.length < 4) return;
  var now = Date.now();
  if (code === lastCode && now - lastTime < 2500) return;
  if (scanned.indexOf(code) !== -1) { setStatus('Already scanned: '+code); return; }
  lastCode = code; lastTime = now;
  scanned.push(code);
  beep(); vib();
  render();
  setStatus('✓ '+code);
}

// ── STATUS ──
function setStatus(msg) {
  document.getElementById('statusTxt').textContent = msg;
}

// ── BEEP + VIBRATE ──
function beep() {
  try {
    var ac = new (window.AudioContext||window.webkitAudioContext)();
    var o = ac.createOscillator(); var g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='square'; o.frequency.value=900;
    g.gain.setValueAtTime(.25,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.12);
    o.start(); o.stop(ac.currentTime+.12);
  } catch(e){}
}
function vib(){ try{ navigator.vibrate && navigator.vibrate(40); }catch(e){} }

// ── TORCH ──
var torchOn = false;
function toggleTorch() {
  try {
    var v = document.getElementById('video');
    var stream = v.srcObject;
    if (!stream) return;
    var track = stream.getVideoTracks()[0];
    if (!track) return;
    torchOn = !torchOn;
    track.applyConstraints({advanced:[{torch:torchOn}]}).catch(function(){
      showErr('Torch not supported on this device');
    });
    document.getElementById('torchBtn').textContent = torchOn ? '🔦' : '⚡';
  } catch(e){}
}

// ── START CAMERA (ZXing) ──
function startCamera() {
  if (!window.ZXing) { showErr('Scanner lib not loaded. Check internet.'); return; }
  setStatus('Requesting camera…');
  var hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.CODE_128,
    ZXing.BarcodeFormat.CODE_39,
    ZXing.BarcodeFormat.CODE_93,
    ZXing.BarcodeFormat.EAN_13,
    ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.ITF,
    ZXing.BarcodeFormat.QR_CODE,
    ZXing.BarcodeFormat.DATA_MATRIX,
    ZXing.BarcodeFormat.AZTEC
  ]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  var reader = new ZXing.BrowserMultiFormatReader(hints, 400);
  reader.listVideoInputDevices().then(function(devices) {
    if (!devices || !devices.length) throw new Error('No camera found');
    // Pick back/rear/environment camera
    var back = devices.filter(function(d){
      return /back|rear|environment|main/i.test(d.label);
    });
    var chosen = back.length ? back[back.length-1] : devices[devices.length-1];
    setStatus('Opening ' + (chosen.label || 'camera') + '…');
    return reader.decodeFromVideoDevice(chosen.deviceId, 'video', function(result, err) {
      if (result) addAWB(result.getText());
    });
  }).then(function(controls){
    track = controls;
    setStatus('Point at barcode — ready ✓');
  }).catch(function(err){
    var msg = err.message || err.toString();
    if (/[Pp]erm|denied/.test(msg)) {
      showErr('Camera blocked! Open site settings → allow camera → reload.');
    } else if (/found|device|camera/i.test(msg)) {
      showErr('No camera found on this device.');
    } else {
      showErr('Camera error: '+msg);
    }
    setStatus('Camera error ⚠');
  });
}

// ── SEND ALL ──
function sendAll() {
  if (!scanned.length) return;
  var awbStr = scanned.join(',');

  // METHOD 1: postMessage to opener (most reliable)
  if (window.opener && !window.opener.closed) {
    try {
      window.opener.postMessage({ type:'OMS_SCAN', awbs: scanned, ctx: CTX }, '*');
      setStatus('Sent '+scanned.length+' AWBs ✓');
      setTimeout(function(){ window.close(); }, 800);
      return;
    } catch(e){}
  }

  // METHOD 2: URL redirect (fallback)
  if (RET_URL) {
    var sep = RET_URL.indexOf('?') !== -1 ? '&' : '?';
    window.location.href = RET_URL + sep + 'awb=' + encodeURIComponent(awbStr) + '&ctx=' + encodeURIComponent(CTX);
    return;
  }

  showErr('Cannot send — no return URL. Re-open from OMS app.');
}

// ── CLOSE ──
function doClose() {
  if (scanned.length > 0) {
    if (!confirm('Discard '+scanned.length+' scanned AWBs?')) return;
  }
  if (track) { try { track.stop(); } catch(e){} }
  window.close();
}

// ── ERROR ──
function showErr(msg) {
  var el = document.getElementById('errBox');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(function(){ el.style.display='none'; }, 5000);
}

// ── MANUAL MODAL ──
function openModal() {
  document.getElementById('modal').classList.add('on');
  setTimeout(function(){ document.getElementById('mInput').focus(); }, 300);
}
function closeModal() {
  document.getElementById('modal').classList.remove('on');
  document.getElementById('mInput').value = '';
}
function doManual() {
  var v = document.getElementById('mInput').value.trim().toUpperCase();
  if (v.length < 4) { showErr('AWB too short (min 4 chars)'); return; }
  addAWB(v); closeModal();
}
document.getElementById('mInput').addEventListener('keyup', function(e){ if(e.key==='Enter') doManual(); });

// ── INIT ──
document.addEventListener('DOMContentLoaded', function(){
  render();
  startCamera();
});
</script>
</body>
</html>
