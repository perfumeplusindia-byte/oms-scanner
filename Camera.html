<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>OMS Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#fff;font-family:'Inter',system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  #video{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:20px;z-index:10;background:linear-gradient(to bottom,rgba(0,0,0,.5) 0%,transparent 30%,transparent 70%,rgba(0,0,0,.7) 100%)}
  #topBar{display:flex;justify-content:space-between;align-items:center}
  #ctxLabel{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);padding:6px 16px;border-radius:999px}
  #closeBtn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #viewfinder{position:relative;align-self:center;width:280px;height:140px;border:2px solid rgba(255,255,255,.5);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .corner{position:absolute;width:20px;height:20px}
  .corner.tl{top:-2px;left:-2px;border-top:4px solid #4edea3;border-left:4px solid #4edea3;border-radius:4px 0 0 0}
  .corner.tr{top:-2px;right:-2px;border-top:4px solid #4edea3;border-right:4px solid #4edea3;border-radius:0 4px 0 0}
  .corner.bl{bottom:-2px;left:-2px;border-bottom:4px solid #4edea3;border-left:4px solid #4edea3;border-radius:0 0 0 4px}
  .corner.br{bottom:-2px;right:-2px;border-bottom:4px solid #4edea3;border-right:4px solid #4edea3;border-radius:0 0 4px 0}
  #scanLine{position:absolute;width:90%;height:2px;background:#4edea3;box-shadow:0 0 10px #4edea3;animation:scan 2s linear infinite;left:5%}
  @keyframes scan{0%{top:15%}50%{top:80%}100%{top:15%}}
  #bottomPanel{display:flex;flex-direction:column;gap:12px}
  #statusBar{text-align:center;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.7}
  #scannedBox{background:rgba(255,255,255,.08);backdrop-filter:blur(8px);border-radius:12px;padding:12px;max-height:180px;overflow-y:auto}
  #scannedTitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.6;margin-bottom:8px}
  #scannedList{display:flex;flex-direction:column;gap:6px}
  .scan-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .scan-icon{width:28px;height:28px;border-radius:6px;background:#4edea3;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .scan-icon svg{width:16px;height:16px;color:#000}
  .scan-awb{font-family:monospace;font-size:13px;font-weight:700;flex:1}
  .scan-del{width:28px;height:28px;background:rgba(255,0,0,.2);border-radius:6px;border:none;color:#ff6b6b;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  #btnRow{display:flex;gap:10px}
  #manualBtn{flex:1;height:48px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  #sendBtn{flex:2;height:48px;background:#000;border:2px solid #4edea3;border-radius:12px;color:#4edea3;font-weight:900;font-size:14px;cursor:pointer;letter-spacing:.05em;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;text-transform:uppercase}
  #sendBtn:hover{background:#4edea3;color:#000}
  #sendBtn:disabled{opacity:.4;cursor:not-allowed}
  #counter{background:#4edea3;color:#000;border-radius:999px;padding:2px 8px;font-size:12px;font-weight:900;min-width:20px;text-align:center}
  #errorMsg{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#dc2626;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:100;display:none;text-align:center;max-width:320px}
  #manualModal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;z-index:200;align-items:flex-end;justify-content:center}
  #manualModal.show{display:flex}
  #manualForm{background:#1a1a1a;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px}
  #manualForm h3{font-size:16px;font-weight:700;margin-bottom:16px}
  #manualInput{width:100%;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:8px;padding:12px 16px;color:#fff;font-family:monospace;font-size:16px;text-transform:uppercase;outline:none;letter-spacing:.05em}
  #manualInput:focus{border-color:#4edea3}
  #manualSubmit{width:100%;margin-top:12px;height:48px;background:#4edea3;border:none;border-radius:10px;color:#000;font-weight:900;font-size:15px;cursor:pointer;letter-spacing:.05em}
  #cancelManual{width:100%;margin-top:8px;height:44px;background:transparent;border:none;color:rgba(255,255,255,.5);font-size:14px;cursor:pointer}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<div id="overlay">
  <div id="topBar">
    <span id="ctxLabel">OMS Scanner</span>
    <button id="closeBtn" onclick="closeScanner()">✕</button>
  </div>
  <div id="viewfinder">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="scanLine"></div>
  </div>
  <div id="bottomPanel">
    <p id="statusBar">Initializing camera...</p>
    <div id="scannedBox">
      <p id="scannedTitle">Scanned AWBs (<span id="counter">0</span>)</p>
      <div id="scannedList"></div>
    </div>
    <div id="btnRow">
      <button id="manualBtn" onclick="showManual()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>Manual
      </button>
      <button id="sendBtn" disabled onclick="sendAll()">
        Send All <span id="counter2">0</span> ▶
      </button>
    </div>
  </div>
</div>
<div id="errorMsg"></div>
<div id="manualModal">
  <div id="manualForm">
    <h3>Manual Entry</h3>
    <input id="manualInput" type="text" placeholder="TYPE AWB NUMBER" autocapitalize="characters" autocomplete="off">
    <button id="manualSubmit" onclick="addManual()">Add AWB</button>
    <button id="cancelManual" onclick="hideManual()">Cancel</button>
  </div>
</div>

<script>
var scanned = [];
var lastScanned = '';
var lastScannedTime = 0;
var retUrl = '';
var ctx = 'dispatch';

// Parse URL params
(function(){
  var p = new URLSearchParams(window.location.search);
  retUrl = p.get('ret') || '';
  ctx    = p.get('ctx') || 'dispatch';
  var label = ctx==='return' ? '⬅ Returns Scan' : ctx==='track' ? '🔍 Track Scan' : '📦 Outbound Scan';
  document.getElementById('ctxLabel').textContent = label;
})();

// Beep
function beep() {
  try {
    var a = new (window.AudioContext||window.webkitAudioContext)();
    var o = a.createOscillator(); var g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = 'square'; o.frequency.value = 880;
    g.gain.setValueAtTime(.3, a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, a.currentTime+.1);
    o.start(); o.stop(a.currentTime+.1);
  } catch(e){}
}

function vibrate() { if(navigator.vibrate) navigator.vibrate(40); }

function setStatus(msg, ok) {
  var el = document.getElementById('statusBar');
  el.textContent = msg;
  el.style.color = ok ? '#4edea3' : 'rgba(255,255,255,.7)';
}

function renderList() {
  var el = document.getElementById('scannedList');
  var cnt = scanned.length;
  document.getElementById('counter').textContent = cnt;
  document.getElementById('counter2').textContent = cnt;
  document.getElementById('sendBtn').disabled = cnt===0;
  if (!cnt) { el.innerHTML='<p style="opacity:.4;font-size:12px;text-align:center;padding:8px 0">No scans yet</p>'; return; }
  el.innerHTML = scanned.map(function(awb,i){
    return '<div class="scan-item">' +
      '<div class="scan-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9V7a2 2 0 012-2h2M3 15v2a2 2 0 002 2h2M15 3h2a2 2 0 012 2v2M15 21h2a2 2 0 002-2v-2"/><path d="M8 12h8"/></svg></div>' +
      '<span class="scan-awb">'+awb+'</span>' +
      '<button class="scan-del" onclick="removeScan('+i+')">×</button></div>';
  }).join('');
}

function removeScan(i){ scanned.splice(i,1); renderList(); }

function addAWB(awb) {
  awb = awb.trim().toUpperCase();
  if (!awb || awb.length<5) return;
  var now = Date.now();
  if (awb===lastScanned && now-lastScannedTime<2000) return;
  if (scanned.indexOf(awb)!==-1) { setStatus('Already scanned: '+awb, false); return; }
  lastScanned = awb; lastScannedTime = now;
  scanned.push(awb);
  beep(); vibrate();
  renderList();
  setStatus('✓ Scanned: ' + awb, true);
}

// ZXing scanner
function startScanner() {
  if (!window.ZXing) { setStatus('Scanner library error'); return; }
  var hints = new Map();
  var formats = [
    ZXing.BarcodeFormat.CODE_128,
    ZXing.BarcodeFormat.CODE_39,
    ZXing.BarcodeFormat.EAN_13,
    ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.ITF,
    ZXing.BarcodeFormat.QR_CODE,
    ZXing.BarcodeFormat.DATA_MATRIX
  ];
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  var reader = new ZXing.BrowserMultiFormatReader(hints, 500);
  setStatus('Starting camera...');
  reader.listVideoInputDevices().then(function(devices) {
    var deviceId;
    // Prefer back camera
    var back = devices.filter(function(d){ return /back|rear|environment/i.test(d.label); });
    deviceId = back.length ? back[back.length-1].deviceId : devices.length ? devices[devices.length-1].deviceId : undefined;
    return reader.decodeFromVideoDevice(deviceId, 'video', function(result, err) {
      if (result) addAWB(result.getText());
      if (err && !(err instanceof ZXing.NotFoundException)) {
        if (!(err instanceof ZXing.ChecksumException)) {
          // Ignore decode errors silently
        }
      }
    });
  }).then(function(){
    setStatus('Camera active — point at barcode');
  }).catch(function(err){
    var msg = err.toString();
    if (msg.includes('Permission')) {
      showError('Camera permission denied. Allow in browser settings.');
    } else if (msg.includes('NotFound') || msg.includes('no device')) {
      showError('No camera found on this device.');
    } else {
      showError('Camera error: ' + err.message);
    }
    setStatus('Camera error ⚠');
  });
}

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display='block';
  setTimeout(function(){ el.style.display='none'; }, 5000);
}

function sendAll() {
  if (!scanned.length) return;
  if (!retUrl) { showError('Return URL missing. Re-open from OMS.'); return; }
  var awbStr = scanned.join(',');
  var url = retUrl + (retUrl.includes('?')?'&':'?') + 'awb=' + encodeURIComponent(awbStr) + '&ctx=' + encodeURIComponent(ctx);
  window.location.href = url;
}

function closeScanner() {
  if (scanned.length>0) {
    if (confirm('Discard '+scanned.length+' scanned AWBs and close?')) {
      window.close();
    }
  } else { window.close(); }
}

function showManual() { document.getElementById('manualModal').classList.add('show'); setTimeout(function(){ document.getElementById('manualInput').focus(); },300); }
function hideManual() { document.getElementById('manualModal').classList.remove('show'); document.getElementById('manualInput').value=''; }
function addManual() {
  var v = document.getElementById('manualInput').value.trim().toUpperCase();
  if (v.length>=5) { addAWB(v); hideManual(); }
  else showError('AWB must be at least 5 characters');
}

document.getElementById('manualInput').addEventListener('keyup',function(e){ if(e.key==='Enter') addManual(); });
document.addEventListener('DOMContentLoaded', function(){ startScanner(); renderList(); });
</script>
</body>
</html>
